services:
  postgres:
    image: postgres:18-alpine
    container_name: pos-db
    environment:
      POSTGRES_DB: pos_db
      POSTGRES_USER: pos_user
      POSTGRES_PASSWORD: pos_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pos_user -d pos_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
    container_name: pos-api
    ports:
      - "8080:8080"
    environment:
      DB_HOST: pos-db
      DB_PORT: "5432"
      DB_USER: pos_user
      DB_PASSWORD: pos_password
      DB_NAME: pos_db
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
